name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: typecheck + test + build ───────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

  # ── Frontend: typecheck + test + build ──────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test frontend
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3001

  # ── Deploy to Azure Container Apps ──────────────────────────────────────────
  deploy:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    env:
      AZURE_RESOURCE_GROUP: NameForge
      AZURE_LOCATION: southeastasia
      AZURE_FOUNDRY_ENDPOINT: ${{ vars.AZURE_FOUNDRY_ENDPOINT }}
      AZURE_FOUNDRY_DEPLOYMENT: ${{ vars.AZURE_FOUNDRY_DEPLOYMENT || 'Kimi-K2.5' }}
      AZURE_FOUNDRY_API_VERSION: ${{ vars.AZURE_FOUNDRY_API_VERSION || '2024-12-01-preview' }}
      AZURE_FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Singapore infrastructure
        id: infra
        run: |
          set -euo pipefail

          DEPLOYMENT_OUTPUTS=$(az deployment group create \
            --name "nameforge-sg-${GITHUB_RUN_ID}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters \
              location="$AZURE_LOCATION" \
              azureFoundryEndpoint="$AZURE_FOUNDRY_ENDPOINT" \
              azureFoundryApiKey="$AZURE_FOUNDRY_API_KEY" \
              azureFoundryDeployment="$AZURE_FOUNDRY_DEPLOYMENT" \
              azureFoundryApiVersion="$AZURE_FOUNDRY_API_VERSION" \
            --query properties.outputs \
            -o json)

          ACR_NAME=$(echo "$DEPLOYMENT_OUTPUTS" | jq -r '.acrName.value')
          ACR_LOGIN_SERVER=$(echo "$DEPLOYMENT_OUTPUTS" | jq -r '.acrLoginServer.value')
          CONTAINER_APP_NAME=$(echo "$DEPLOYMENT_OUTPUTS" | jq -r '.containerAppName.value')
          CONTAINER_APP_URL=$(echo "$DEPLOYMENT_OUTPUTS" | jq -r '.containerAppUrl.value')
          IMAGE_REPOSITORY=$(echo "$DEPLOYMENT_OUTPUTS" | jq -r '.imageRepository.value')

          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "container_app_name=$CONTAINER_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "container_app_url=$CONTAINER_APP_URL" >> "$GITHUB_OUTPUT"
          echo "image_repository=$IMAGE_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Build and push image via ACR Tasks
        run: |
          IMAGE_TAG=${{ github.sha }}
          az acr build \
            --registry "${{ steps.infra.outputs.acr_name }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ steps.infra.outputs.image_repository }}:${IMAGE_TAG}" \
            --image "${{ steps.infra.outputs.image_repository }}:latest" \
            .

      - name: Deploy new revision to Container App
        run: |
          IMAGE_TAG=${{ github.sha }}
          REV_SUFFIX="sha-${IMAGE_TAG:0:7}"
          az containerapp update \
            --name "${{ steps.infra.outputs.container_app_name }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ steps.infra.outputs.acr_login_server }}/${{ steps.infra.outputs.image_repository }}:${IMAGE_TAG}" \
            --revision-suffix ${REV_SUFFIX}

      - name: Show Singapore app URL
        run: echo "Deployed to ${{ steps.infra.outputs.container_app_url }}"

  # ── Auto-bump minor version ──────────────────────────────────────────────────
  version-bump:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump minor version
        run: |
          NEW_VERSION=$(node scripts/bump-version.js minor)
          git add package.json backend/package.json frontend/package.json
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push
